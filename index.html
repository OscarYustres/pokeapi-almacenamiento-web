<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon API</title>
    <link rel="stylesheet" href="estilos.css">
    <script type="module" src="script.js"></script>
</head>

<body>
    <header>
        <h1>Clase manejo DOM usando API</h1>
    </header>

    <main>
        <section class="section-contenido">

            <h2 class="titulo-oscuro">Este es el contenido principal de la API de Pokémon.</h2>

            <div id="barra-de-busqueda">
                <label for="nombre-personaje"> Buscar personaje</label>
                <input type="text" id="nombre-personaje" name="busqueda-personaje">
                <button type="button" id="boton-buscar">🔍</button>
                <button type="button" id="boton-borrar-resultados">Limpiar Resultados</button>
            </div>

            <div id="container-tarjetas-busqueda"></div>

            <h2 class="titulo-oscuro">FAVORITOS</h2>
            <div id="favs" class="container-tarjetas"></div>

            <h2 class="titulo-oscuro">TODOS LOS POKÉMON</h2>
            <div id="lista-general" class="container-tarjetas"></div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Practica DOM y API</p>
    </footer>

</body>

</html>
